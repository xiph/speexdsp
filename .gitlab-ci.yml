default:
  tags:
    - docker
  # Image from https://hub.docker.com/_/gcc/ based on Debian
  image: gcc:9

.autoconf:
  stage: build
  before_script:
    - apt-get update &&
      apt-get install -y libfftw3-dev
  script:
    - ./autogen.sh
    - ./configure ${CONFIG_FLAGS}
    - make
    - make check

autoconf:
  extends: .autoconf
  script:
    - ./autogen.sh
    - ./configure ${CONFIG_FLAGS}
    - make
    - make distcheck

fixed-point:
  extends: .autoconf
  variables:
    CONFIG_FLAGS: --enable-fixed-point

no-float:
  extends: .autoconf
  variables:
    CONFIG_FLAGS: --enable-fixed-point --disable-float-api

no-examples:
  extends: .autoconf
  variables:
    CONFIG_FLAGS: --disable-examples

.cmake:
  stage: build
  before_script:
    - apt-get update &&
      apt-get install -y cmake
  script:
    - cmake -S . -B build ${CMAKE_FLAGS}
    - cmake --build build

cmake:
  extends: .cmake

cmake-fixed-point:
  extends: .cmake
  variables:
    CMAKE_FLAGS: -DUSE_FIXED_POINT=ON

cmake-shared:
  extends: .cmake
  variables:
    CMAKE_FLAGS: -DBUILD_SHARED_LIBS=ON
